# Server
server.port=${PORT:8080}

# Database (Neon/Supabase/Railway PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:anuragUniversityExamHallLocatorSystemSecretKey2024VeryLongSecretKey}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Twilio
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}

# CORS
app.cors.allowed-origins=https://examhall-frontend.vercel.app,http://localhost:3000,https://examhall-frontend-8r2h31qs2-surviruthvikas-projects.vercel.app,https://examhall-frontend-git-main-surviruthvikas-projects.vercel.app
# Logging
logging.level.com.anurag=INFO
logging.level.org.springframework.security=WARN
